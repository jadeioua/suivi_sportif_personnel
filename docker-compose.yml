services:
  db:
    image: postgres:16

    container_name: suivi_sportif_db

    environment:
      POSTGRES_DB: suivi_sportif_personnel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: